<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Ficha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="js/grimorio-core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cinzel: ['Cinzel', 'serif'], sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { theme: { bg: '#0a0a0c', panel: '#0f0f12', border: '#2a2a2e', text: '#e8e4dc', blue: '#4a9eff', orange: '#ff6b35', green: '#10b981', purple: '#8b5cf6', pink: '#ec4899', yellow: '#f59e0b' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: #e8e4dc; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .anim-entry { animation: fadeInUp 0.6s ease-out forwards; opacity: 0; }
        .custom-input { width: 100%; background: transparent; border-bottom: 1px solid #2a2a2e; color: #e8e4dc; padding: 0.5rem 0; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .custom-input:focus { border-bottom-color: #4a9eff; outline: none; }
        .custom-textarea { width: 100%; background: #0a0a0c; border: 1px solid #2a2a2e; color: #e8e4dc; padding: 0.75rem; border-radius: 0.375rem; resize: vertical; min-height: 100px; transition: all 0.3s; font-family: 'Inter', sans-serif; }
        .custom-textarea:focus { border-color: #4a9eff; outline: none; }
        .avatar-upload { background-size: cover; background-position: center; transition: all 0.3s; cursor: pointer; }
        .card-highlight { position: relative; overflow: hidden; }
        .card-highlight::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: linear-gradient(90deg, transparent, currentColor, transparent); }
    </style>
</head>
<body class="min-h-screen font-sans pb-20">
    <nav class="w-full bg-[#0f0f12]/95 border-b border-theme-border sticky top-0 z-50 mb-8">
        <div class="max-w-screen-2xl mx-auto px-6 flex items-center justify-between py-4">
            <a href="index.html" class="flex items-center gap-2 px-3 py-2 bg-theme-blue/10 border border-theme-blue/30 rounded-lg text-theme-blue font-medium transition-all hover:bg-theme-blue/20">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span class="font-cinzel text-sm hidden sm:inline">Hub</span>
            </a>
            <span class="font-cinzel text-lg font-bold text-theme-blue uppercase tracking-wider">Grimório Digital</span>
            <button onclick="save()" class="px-4 py-2 bg-theme-blue text-white rounded-lg text-sm font-medium">SALVAR</button>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 space-y-6">
        <section class="bg-theme-panel border border-theme-border p-6 rounded-lg anim-entry card-highlight text-theme-blue">
            <h3 class="flex items-center gap-2 font-cinzel text-lg font-semibold mb-6"><i data-lucide="user" class="w-5 h-5"></i> Identidade</h3>
            <div class="flex flex-col md:flex-row gap-8">
                <div class="w-full md:w-32 text-center">
                    <div id="avatar-container" class="aspect-square bg-black border-2 border-dashed border-theme-border rounded-lg avatar-upload flex flex-col items-center justify-center p-2" onclick="document.getElementById('f-up').click()">
                        <i data-lucide="camera" class="w-8 h-8 text-gray-700"></i>
                    </div>
                    <input type="file" id="f-up" class="hidden" accept="image/*" onchange="preview(event)">
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4 flex-grow">
                    <div class="md:col-span-2"><label class="text-[10px] text-gray-500 uppercase">Nome</label><input type="text" id="i-name" class="custom-input data"></div>
                    <div class="md:col-span-2"><label class="text-[10px] text-gray-500 uppercase">Título</label><input type="text" id="i-title" class="custom-input data"></div>
                    <div><label class="text-[10px] text-gray-500 uppercase">Nível</label><input type="number" id="i-lv" class="custom-input data"></div>
                    <div><label class="text-[10px] text-gray-500 uppercase">Raça</label><input type="text" id="i-race" class="custom-input data"></div>
                    <div><label class="text-[10px] text-gray-500 uppercase">Classe</label><input type="text" id="i-class" class="custom-input data"></div>
                    <div><label class="text-[10px] text-gray-500 uppercase">Idade</label><input type="text" id="i-age" class="custom-input data"></div>
                </div>
            </div>
        </section>

        <section class="bg-theme-panel border border-theme-border p-6 rounded-lg anim-entry card-highlight text-theme-orange">
            <h3 class="flex items-center gap-2 font-cinzel text-lg mb-6"><i data-lucide="palette" class="w-5 h-5"></i> Aparência</h3>
            <div class="grid md:grid-cols-2 gap-4">
                <textarea id="i-head" class="custom-textarea data" placeholder="Rosto / Cabelo"></textarea>
                <textarea id="i-torso" class="custom-textarea data" placeholder="Corpo / Estatura"></textarea>
            </div>
        </section>

        <section class="bg-theme-panel border border-theme-border p-6 rounded-lg anim-entry card-highlight text-theme-green">
            <h3 class="flex items-center gap-2 font-cinzel text-lg mb-6"><i data-lucide="book" class="w-5 h-5"></i> História</h3>
            <textarea id="i-bio" class="custom-textarea data h-40" placeholder="História do personagem"></textarea>
        </section>
    </div>

    <script>
        const q = s => document.querySelector(s);
        let user = Core.load();

        const map = {
            'i-name': 'name', 'i-title': 'title', 'i-lv': 'level',
            'i-race': 'race', 'i-class': 'class', 'i-age': 'age',
            'i-head': 'head', 'i-torso': 'torso', 'i-bio': 'bio'
        };

        function render() {
            Object.entries(map).forEach(([id, k]) => q('#'+id).value = user[k] || '');
            if (user.avatar) q('#avatar-container').style.backgroundImage = `url('${user.avatar}')`;
            lucide.createIcons();
        }

        function save() {
            Object.entries(map).forEach(([id, k]) => user[k] = q('#'+id).value);
            Core.save(user); Core.notify('Ficha salva!');
        }

        function preview(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = ev => { user.avatar = ev.target.result; q('#avatar-container').style.backgroundImage = `url('${ev.target.result}')`; };
            r.readAsDataURL(f);
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
