        // 5. SISTEMA DE AVATAR
        function previewImage(event) {
            const file = event.target.files[0];
            if (!file) return;

            // Validar tipo e tamanho
            if (!file.type.match('image.*')) {
                showFeedback('❌ Erro', 'Por favor, selecione uma imagem válida.', 'error');
                return;
            }

            if (file.size > 5 * 1024 * 1024) {
                showFeedback('⚠️ Tamanho excessivo', 'A imagem deve ter menos de 5MB.', 'warning');
                return;
            }

            const reader = new FileReader();
            reader.onload = function (e) {
                // Comprimir imagem
                comprimirImagem(e.target.result, 400, function (imagemComprimida) {
                    currentAvatar = imagemComprimida;

                    // Aplicar ao container
                    const container = document.getElementById('avatar-container');
                    container.style.backgroundImage = `url('${imagemComprimida}')`;
                    container.querySelector('.avatar-placeholder').style.opacity = '0';

                    // Marcar como não salvo
                    hasUnsavedChanges = true;

                    showFeedback('📷 Avatar carregado', 'Clique em "Salvar e Aplicar" para gravar.', 'info');
                });
            };
            reader.readAsDataURL(file);
        }

        function comprimirImagem(base64, tamanhoMax, callback) {
            const img = new Image();
            img.src = base64;

            img.onload = function () {
                const canvas = document.createElement('canvas');
                let width = img.width;
                let height = img.height;

                // Redimensionar mantendo proporção
                if (width > height) {
                    if (width > tamanhoMax) {
                        height = Math.round((height * tamanhoMax) / width);
                        width = tamanhoMax;
                    }
                } else {
                    if (height > tamanhoMax) {
                        width = Math.round((width * tamanhoMax) / height);
                        height = tamanhoMax;
                    }
                }

                canvas.width = width;
                canvas.height = height;

                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, width, height);

                // Converter para JPEG com 85% de qualidade
                const imagemComprimida = canvas.toDataURL('image/jpeg', 0.85);
                callback(imagemComprimida);
            };
        }

        function getActiveProfile() {

        function configurarAutoSave() {
            // Configurar salvamento automático após 30 segundos de inatividade
            const campos = document.querySelectorAll('.data-field');

            campos.forEach(campo => {
                campo.addEventListener('input', function () {
                    hasUnsavedChanges = true;

                    clearTimeout(autoSaveTimer);
                    autoSaveTimer = setTimeout(function () {
                        if (hasUnsavedChanges && confirm('Salvar alterações automaticamente?')) {
                            salvarEAplicar();
                        }
                    }, 30000); // 30 segundos
                });
            });

            // Alertar antes de sair se houver alterações não salvas
            window.addEventListener('beforeunload', function (e) {
                if (hasUnsavedChanges) {
                    e.preventDefault();
                    e.returnValue = 'Você tem alterações não salvas. Deseja realmente sair?';
                }
            });
        }

                case 'success':
                    corBg = 'bg-green-900/20';
                    corBorda = 'border-green-700';
                    corTexto = 'text-green-300';
                    icone = 'check-circle';
                    break;
                case 'error':
                    corBg = 'bg-red-900/20';
                    corBorda = 'border-red-700';
                    corTexto = 'text-red-300';
                    icone = 'alert-circle';

                case 'warning':
                    corBg = 'bg-yellow-900/20';
                    corBorda = 'border-yellow-700';
                    corTexto = 'text-yellow-300';
                    icone = 'alert-triangle';
                    break;
                default:
                    corBg = 'bg-blue-900/20';
                    corBorda = 'border-blue-700';
                    corTexto = 'text-blue-300';
                    icone = 'info';
            }

            // Atualizar conteúdo
            icon.innerHTML = `<i data-lucide="${icone}" class="w-5 h-5"></i>`;
            titleEl.textContent = titulo;

        function exportarTXT() {
            const dados = coletarTodosDados();
            const campos = getCamposFicha(dados);

            const texto = campos.map(c => `${c.t} - ${c.v || 'Não preenchido'}`).join('\n\n===============================================================\n\n');

            const blob = new Blob([texto], { type: 'text/plain;charset=utf-8' });
            const link = document.createElement('a');
            const nomeArquivo = `ficha_${(dados.nome || 'personagem').toLowerCase().replace(/\s+/g, '_')}.txt`;

            link.href = URL.createObjectURL(blob);
            link.download = nomeArquivo;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showFeedback('📄 Exportado!', 'Ficha salva como arquivo TXT limpo.', 'success');
        }

        function exportarWord() {
            const dados = coletarTodosDados();
            const campos = getCamposFicha(dados);
            const formatString = (str) => (str || 'Não preenchido').replace(/\n/g, '<br/>');

            const corpoHtml = campos.map(c => `<span><strong>${c.t}</strong> - ${formatString(c.v)}</span>`).join('<br/><br/>=====<br/><br/>');

            let html = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head>
                    <meta charset='utf-8'>
                    <title>Ficha Personagem</title>
                    <style>
                        body { font-family: 'Segoe UI', Arial, sans-serif; line-height: 1.6; color: #333; padding: 20px;}
                    </style>
                </head>
                <body>
                    ${corpoHtml}
                </body>
                </html>
            `;

            const blob = new Blob(['\ufeff', html], { type: 'application/msword' });
            const link = document.createElement('a');
            const nomeArquivo = `ficha_${(dados.nome || 'personagem').toLowerCase().replace(/\s+/g, '_')}.doc`;

            link.href = URL.createObjectURL(blob);
            link.download = nomeArquivo;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            showFeedback('📄 Exportado!', 'Ficha salva como arquivo Word limpo.', 'success');
        }
