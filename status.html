<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Status Avançado</title>
    <script src="js/grimorio-core.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --bg: #0a0a0c; --panel: #0f0f12; --border: #2a2a2e; --blue: #4a9eff; }
        body { background: var(--bg); color: #e8e4dc; font-family: 'Inter', sans-serif; margin: 0; }
        .nav { background: var(--panel); border-bottom: 1px solid var(--border); padding: 1rem; position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
        .section { background: var(--panel); border: 1px solid var(--border); border-radius: 1rem; padding: 1.5rem; margin: 1.5rem; }
        .grid { display: grid; gap: 1rem; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); }
        .card { background: rgba(255,255,255,0.03); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; }
        input, select { background: #000; border: 1px solid var(--border); color: #fff; padding: 0.4rem; border-radius: 0.3rem; outline: none; }
        .btn { padding: 0.5rem 1rem; border-radius: 0.4rem; border: none; cursor: pointer; font-size: 0.8rem; font-weight: bold; }
        .btn-blue { background: var(--blue); color: #fff; }
        .btn-red { background: #dc2626; color: #fff; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; }
        .modal.active { display: flex; }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="flex items-center gap-4">
            <a href="index.html" style="color:var(--blue); text-decoration:none" class="font-cinzel">← HUB</a>
            <h1 class="font-cinzel" style="font-size:1.2rem">STATUS & ATRIBUTOS</h1>
        </div>
        <button onclick="saveAll()" class="btn btn-blue">SALVAR TUDO</button>
    </nav>

    <section class="section">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-cinzel text-blue">VITAIS</h2>
            <button onclick="openModal('m-cat')" class="btn btn-blue text-xs">+ NOVO</button>
        </div>
        <div id="cats" class="grid"></div>
    </section>

    <section class="section">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-cinzel text-blue">ATRIBUTOS</h2>
            <button onclick="openModal('m-attr')" class="btn btn-blue text-xs">+ NOVO</button>
        </div>
        <div id="attrs" class="grid"></div>
    </section>

    <section class="section">
        <h2 class="font-cinzel text-blue mb-4">DADOS & SORTE</h2>
        <div class="grid">
            <div class="card text-center">
                <p class="text-xs text-gray-500 uppercase">Sorte</p>
                <div id="luck-val" class="font-cinzel text-4xl py-2">50%</div>
                <button onclick="rollLuck()" class="btn btn-blue w-full">ROLAR SORTE</button>
            </div>
            <div class="card text-center">
                <p class="text-xs text-gray-500 uppercase">Último Dado</p>
                <div id="dice-res" class="font-cinzel text-4xl py-2">-</div>
                <div class="flex gap-1 mt-2">
                    <input type="number" id="d-qty" value="1" class="w-12 text-center">
                    <select id="d-type" class="flex-grow"><option value="20">D20</option><option value="6">D6</option><option value="10">D10</option><option value="100">D100</option></select>
                    <button onclick="rollDice()" class="btn btn-blue">ROLL</button>
                </div>
            </div>
        </div>
    </section>

    <div id="m-cat" class="modal"><div class="card w-64"><h3>Nova Categoria</h3><input id="nc-name" placeholder="Nome" class="w-full mt-2"><button onclick="addCat()" class="btn btn-blue w-full mt-2">ADICIONAR</button></div></div>
    <div id="m-attr" class="modal"><div class="card w-64"><h3>Novo Atributo</h3><input id="na-name" placeholder="Nome" class="w-full mt-2"><button onclick="addAttr()" class="btn btn-blue w-full mt-2">ADICIONAR</button></div></div>

    <script>
        const q = s => document.querySelector(s);
        let user = Core.load();
        let st = user.status;

        function render() {
            q('#cats').innerHTML = st.cats.map((c, i) => `
                <div class="card border-l-4" style="border-left-color:${c.color}">
                    <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold">${c.name}</span><button onclick="delCat(${i})" class="text-red-500 text-xs">X</button></div>
                    <div class="flex gap-2 items-center"><input type="number" value="${c.val}" onchange="upCat(${i},'val',this.value)" class="w-16"> / <input type="number" value="${c.max}" onchange="upCat(${i},'max',this.value)" class="w-16"></div>
                </div>
            `).join('');
            q('#attrs').innerHTML = st.attrs.map((a, i) => `
                <div class="card">
                    <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold">${a.name}</span><button onclick="delAttr(${i})" class="text-red-500 text-xs">X</button></div>
                    <input type="number" value="${a.val}" onchange="upAttr(${i},this.value)" class="w-full text-center text-xl font-bold">
                </div>
            `).join('');
            q('#luck-val').innerText = st.luck.val + '%';
            q('#dice-res').innerText = st.dice.last;
            lucide.createIcons();
        }

        function upCat(i, f, v) { st.cats[i][f] = parseInt(v); }
        function upAttr(i, v) { st.attrs[i].val = parseInt(v); }
        function delCat(i) { st.cats.splice(i, 1); render(); }
        function delAttr(i) { st.attrs.splice(i, 1); render(); }
        function addCat() { st.cats.push({ name: q('#nc-name').value, val: 100, max: 100, color: '#4a9eff' }); closeModal('m-cat'); render(); }
        function addAttr() { st.attrs.push({ name: q('#na-name').value, val: 0, max: 100 }); closeModal('m-attr'); render(); }
        function rollLuck() { st.luck.val = Math.floor(Math.random() * 100) + 1; render(); }
        function rollDice() {
            const qt = parseInt(q('#d-qty').value); const ty = parseInt(q('#d-type').value);
            let res = 0; for(let i=0; i<qt; i++) res += Math.floor(Math.random() * ty) + 1;
            st.dice.last = res; render();
        }
        function saveAll() { user.status = st; Core.save(user); Core.notify('Status Salvos!'); }
        function openModal(id) { q('#'+id).classList.add('active'); }
        function closeModal(id) { q('#'+id).classList.remove('active'); }
        window.onclick = e => { if(e.target.classList.contains('modal')) e.target.classList.remove('active'); };
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
