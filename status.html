<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Status & Atributos</title>

    <!-- =====================================================/////////////====================================================== -->
    <script src="js/grimorio-core.js"></script>

    <!-- =====================================================/////////////====================================================== -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- =====================================================/////////////====================================================== -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <!-- =====================================================/////////////====================================================== -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cinzel: ['Cinzel', 'serif'], sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { theme: { bg: '#0a0a0c', panel: '#0f0f12', border: '#2a2a2e', blue: '#4a9eff', red: '#ef4444', green: '#22c55e', yellow: '#f59e0b', purple: '#818cf8', gray: '#94a3b8' } }
                }
            }
        }
    </script>

    <!-- =====================================================/////////////====================================================== -->
    <style>
        body { background-color: #0a0a0c; color: #e2e8f0; scroll-behavior: smooth; }
        .glass { background: rgba(15, 15, 18, 0.6); backdrop-filter: blur(10px); border: 1px solid rgba(42, 42, 46, 0.5); }
        .input-bare { background: transparent; border: none; outline: none; width: 100%; color: inherit; font-family: inherit; }
        .progress-bar { height: 6px; border-radius: 3px; background: #1a1a1e; overflow: hidden; position: relative; }
        .progress-fill { height: 100%; transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .attr-card { transition: all 0.23s ease; border: 1px solid #2a2a2e; }
        .attr-card:hover { border-color: #4a9eff; transform: translateY(-2px); box-shadow: 0 4px 20px rgba(0,0,0,0.4); }
    </style>
</head>

    <!-- =====================================================/////////////====================================================== -->
    <body class="min-h-screen pb-20">

    <!-- =====================================================/////////////====================================================== -->
    <nav class="w-full bg-[#0f0f12]/90 backdrop-blur-md border-b border-theme-border sticky top-0 z-50 px-6 py-4">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <div class="flex items-center gap-4">
                <a href="index.html" class="p-2 hover:bg-white/5 rounded-lg transition-colors text-theme-gray hover:text-white"><i data-lucide="arrow-left" class="w-5 h-5"></i></a>
                <h1 class="font-cinzel text-xl font-bold tracking-widest text-white uppercase italic">Status <span class="text-theme-blue">&</span> Atributos</h1>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="save()" class="flex items-center gap-2 px-4 py-2 bg-theme-blue/10 border border-theme-blue/30 text-theme-blue rounded-lg text-sm font-semibold hover:bg-theme-blue/20 transition-all">
                    <i data-lucide="save" class="w-4 h-4"></i> SALVAR
                </button>
            </div>
        </div>
    </nav>

    <!-- =====================================================/////////////====================================================== -->
    <main class="max-w-7xl mx-auto px-6 mt-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        <div class="lg:col-span-4 space-y-6">

    <!-- =====================================================/////////////====================================================== -->
    <section class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-cinzel font-bold text-theme-blue flex items-center gap-2"><i data-lucide="heart" class="w-5 h-5"></i> VITAIS</h2>
                </div>
                <div id="vitals-list" class="space-y-6"></div>
            </section>

    <!-- =====================================================/////////////====================================================== -->
    <section class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-cinzel font-bold text-theme-yellow flex items-center gap-2"><i data-lucide="sparkles" class="w-5 h-5"></i> SORTE & DESTINO</h2>
                </div>
                <div class="space-y-4">
                    <div class="bg-black/40 p-4 rounded-xl border border-theme-border flex items-center justify-between">
                        <span class="text-sm font-medium text-theme-gray">Índice de Sorte</span>
                        <input type="number" id="luck-val" class="w-16 bg-transparent text-right font-mono text-xl text-theme-yellow" onchange="updateLuck()">
                    </div>
                    <button onclick="rollLuck()" class="w-full py-3 bg-theme-yellow/10 border border-theme-yellow/30 text-theme-yellow rounded-xl text-xs font-bold uppercase tracking-widest hover:bg-theme-yellow/20 transition-all">Testar Destino</button>
                </div>
            </section>
        </div>

        <div class="lg:col-span-8 space-y-6">

    <!-- =====================================================/////////////====================================================== -->
    <section class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-8">
                    <h2 class="font-cinzel font-bold text-white flex items-center gap-2"><i data-lucide="shield-check" class="w-5 h-5"></i> ATRIBUTOS BASE</h2>
                </div>
                <div id="attrs-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-4"></div>
            </section>

    <!-- =====================================================/////////////====================================================== -->
    <section class="glass rounded-2xl p-6">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="font-cinzel font-bold text-theme-purple flex items-center gap-2"><i data-lucide="dices" class="w-5 h-5"></i> ROLAGEM DE DADOS</h2>
                </div>
                <div class="bg-black/40 p-6 rounded-xl border border-theme-border">
                    <div class="flex items-center gap-4 mb-6">
                        <input type="number" id="roll-qty" value="1" class="w-16 bg-theme-panel border border-theme-border rounded-lg p-2 text-center font-mono">
                        <span class="text-theme-gray font-mono">d</span>
                        <select id="roll-type" class="flex-grow bg-theme-panel border border-theme-border rounded-lg p-2 font-mono">
                            <option value="4">4</option><option value="6">6</option><option value="8">8</option>
                            <option value="10">10</option><option value="12">12</option><option value="20" selected>20</option>
                            <option value="100">100</option>
                        </select>
                        <button onclick="roll()" class="px-8 py-2 bg-theme-purple text-white rounded-lg font-bold hover:brightness-110 transition-all shadow-lg shadow-theme-purple/20">ROLAR</button>
                    </div>
                    <div id="roll-result" class="h-24 bg-black/60 rounded-xl border border-white/5 flex flex-col items-center justify-center">
                        <span class="text-gray-600 text-[10px] uppercase font-mono mb-1">Último Resultado</span>
                        <span id="last-roll" class="text-4xl font-mono font-bold text-theme-purple">-</span>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <!-- =====================================================/////////////====================================================== -->
    <script>
        let p = Core.load();
        const colors = { red: '#ef4444', blue: '#4a9eff', green: '#22c55e', yellow: '#f59e0b', purple: '#818cf8' };

        function render() {
            const vit = document.getElementById('vitals-list');
            vit.innerHTML = p.status.cats.map((c, i) => `
                <div class="space-y-2">
                    <div class="flex justify-between items-end">
                        <span class="text-[11px] font-bold uppercase tracking-wider text-theme-gray">${c.name}</span>
                        <div class="flex items-center gap-2">
                            <input type="number" value="${c.val}" onchange="updateCat(${i}, 'val', this.value)" class="w-12 bg-transparent text-right font-mono text-lg font-bold" style="color: ${colors[c.color]}">
                            <span class="text-xs text-gray-600 font-mono">/</span>
                            <input type="number" value="${c.max}" onchange="updateCat(${i}, 'max', this.value)" class="w-12 bg-transparent text-gray-500 font-mono text-sm">
                        </div>
                    </div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${(c.val/c.max)*100}%; background: ${colors[c.color]}"></div></div>
                </div>
            `).join('');

            const grid = document.getElementById('attrs-grid');
            grid.innerHTML = p.status.attrs.map((a, i) => `
                <div class="attr-card bg-theme-panel/40 p-4 rounded-xl group">
                    <p class="text-[10px] text-theme-gray uppercase font-bold mb-1 group-hover:text-theme-blue transition-colors">${a.name}</p>
                    <input type="number" value="${a.val}" onchange="updateAttr(${i}, this.value)" class="input-bare text-2xl font-mono font-bold">
                </div>
            `).join('');

            document.getElementById('luck-val').value = p.status.luck.val;
            document.getElementById('last-roll').innerText = p.status.dice.last;
            lucide.createIcons();
        }

        function updateCat(i, k, v) { p.status.cats[i][k] = parseInt(v); render(); }
        function updateAttr(i, v) { p.status.attrs[i].val = parseInt(v); }
        function updateLuck() { p.status.luck.val = parseInt(document.getElementById('luck-val').value); }
        function save() { Core.save(p); Core.notify('Status salvos!', 'success'); }
        function rollLuck() { document.getElementById('luck-val').value = Math.floor(Math.random() * 100); updateLuck(); render(); }
        function roll() {
            const q = parseInt(document.getElementById('roll-qty').value);
            const t = parseInt(document.getElementById('roll-type').value);
            let res = 0; for(let i=0; i<q; i++) res += Math.floor(Math.random() * t) + 1;
            p.status.dice.last = res; document.getElementById('last-roll').innerText = res;
        }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
