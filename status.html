    function distributeRandom() {
        const totalPoints = parseInt(document.getElementById("total-points").value);
        if (!totalPoints || totalPoints <= 0) {
            showNotification("Digite um número válido de pontos!", "error");
            return;
        }
        
        const activeAttributes = systemData.attributes.filter(attr => attr.active);
        if (activeAttributes.length === 0) {
            showNotification("Nenhum atributo ativo para distribuir!", "error");
            return;
        }
        
        // Resetar valores
        activeAttributes.forEach(attr => {
            if (!attr.locked) {
                attr.value = 0;
            }
        });
        
        // Distribuir aleatoriamente
        let pointsLeft = totalPoints;
        const distribution = {};
        
        // Primeiro, distribuir para atributos destrancados
        const unlockedAttributes = activeAttributes.filter(attr => !attr.locked);
        
        while (pointsLeft > 0 && unlockedAttributes.length > 0) {
            const randomIndex = Math.floor(Math.random() * unlockedAttributes.length);
            const attr = unlockedAttributes[randomIndex];
            
            if (attr.value < attr.max) {
                if (!distribution[attr.id]) distribution[attr.id] = 0;
                
                distribution[attr.id]++;
                attr.value = Math.min(attr.max, attr.value + 1);
                pointsLeft--;
                
                // Se atingiu o máximo, remover da lista
                if (attr.value >= attr.max) {
                    unlockedAttributes.splice(randomIndex, 1);
                }
            }
        }
        
        // Se ainda sobraram pontos, mostrar aviso
        if (pointsLeft > 0) {
            showNotification(`${pointsLeft} pontos não puderam ser distribuídos (limites máximos atingidos)`, "warning");
        }
        
        renderAttributes();
        updateDerivedAttributes();
        saveToStorage();
        
        const summary = activeAttributes.map(attr => 
            `${attr.name}: ${attr.value}`
        ).join(", ");
        
        showNotification(`${totalPoints} pontos distribuídos: ${summary}`, "success");
    }

        // Calcular pontos necessários para o mínimo
        let pointsNeeded = 0;
        unlockedAttributes.forEach(attr => {
            if (attr.value < minValue) {
                pointsNeeded += (minValue - attr.value);
            }
        });
        
        // Verificar se há pontos suficientes (considerando máximo 100 por atributo)
        const maxPossiblePoints = unlockedAttributes.length * 100;
        if (minValue * unlockedAttributes.length > maxPossiblePoints) {
            showNotification(`Valor mínimo muito alto para ${unlockedAttributes.length} atributos!`, "error");
            return;
        }
        
        // Aplicar mínimo primeiro
        unlockedAttributes.forEach(attr => {
            if (attr.value < minValue) {
                attr.value = minValue;
            }
        });
        
        // Calcular pontos restantes para distribuição aleatória
        const currentTotal = unlockedAttributes.reduce((sum, attr) => sum + attr.value, 0);
        const maxTotal = unlockedAttributes.reduce((sum, attr) => sum + attr.max, 0);
        const remainingCapacity = maxTotal - currentTotal;
        
        if (remainingCapacity > 0) {
            // Distribuir pontos aleatórios extras
            let extraPoints = Math.floor(remainingCapacity * 0.3); // 30% da capacidade restante
            
            while (extraPoints > 0) {
                const randomIndex = Math.floor(Math.random() * unlockedAttributes.length);
                const attr = unlockedAttributes[randomIndex];
                
                if (attr.value < attr.max) {
                    attr.value++;
                    extraPoints--;
                }
            }
        }
        
        renderAttributes();
        updateDerivedAttributes();
        saveToStorage();
        
        const summary = unlockedAttributes.map(attr => 
            `${attr.name}: ${attr.value}`
        ).join(", ");
        
        showNotification(`Distribuído com mínimo de ${minValue}: ${summary}`, "success");
    }

    function addDerived() {

        if (!name || !baseAttr || isNaN(modifier)) {
            showNotification("Preencha todos os campos corretamente!", "error");
            return;
        }
        
        const formula = `${getAttributeName(baseAttr)} ${operation} ${modifier}`;
        
        const newDerived = {
            id: Date.now(),
            name,
            formula,
            value: 0,
            operation,
            modifier,
            baseAttr,
            active: true
        };

        renderDerived();

    function getAttributeName(key) {
        const attr = systemData.attributes.find(a => 
            a.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === key
        );
        return attr ? attr.name : key;
    }
    
    function updateDerivedAttributes() {
        systemData.derived.forEach(derived => {
            if (!derived.active) return;
            
            const baseAttr = systemData.attributes.find(a => 
                a.name.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "") === derived.baseAttr
            );
            
            if (!baseAttr) {
                derived.value = 0;
                return;
            }
            
            let result = 0;
            const baseValue = baseAttr.value;
            
            switch(derived.operation) {
                case "+":
                    result = baseValue + derived.modifier;
                    break;
                case "-":
                    result = baseValue - derived.modifier;
                    break;
                case "*":
                    result = baseValue * derived.modifier;
                    break;
                case "/":
                    result = derived.modifier !== 0 ? baseValue / derived.modifier : 0;
                    break;
                case "%":
                    result = (baseValue * derived.modifier) / 100;
                    break;
            }
            
            derived.value = Math.round(result * 100) / 100;
        });
        
        renderDerived();
    }

    function rollLuck() {
        // Sorte base aleatória 1-100
        const baseLuck = Math.floor(Math.random() * 100) + 1;
        
        // Aplicar modificadores dos sentimentos ativos
        let finalLuck = baseLuck;
        let modifiersText = [];
        
        systemData.luck.sentiments.forEach(sentiment => {
            if (!sentiment.active || sentiment.effect === "neutral") return;
            
            const modifier = sentiment.intensity * 20; // Convert 0-1 para 0-20
            if (sentiment.effect === "buff") {
                finalLuck += modifier;
                modifiersText.push(`+${modifier.toFixed(1)} (${sentiment.type})`);
            } else if (sentiment.effect === "debuff") {
                finalLuck -= modifier;
                modifiersText.push(`-${modifier.toFixed(1)} (${sentiment.type})`);
            }
        });
        
        // Garantir limites 1-100
        finalLuck = Math.max(1, Math.min(100, Math.round(finalLuck)));
        
        // Salvar no histórico
        systemData.luck.rollHistory.push({
            base: baseLuck,
            final: finalLuck,
            modifiers: modifiersText,
            timestamp: new Date().toLocaleString()
        });
        
        // Atualizar display
        systemData.luck.value = finalLuck;
        document.getElementById("luck-value").textContent = finalLuck;
        
        // Mostrar resultado
        let message = `Sorte: ${finalLuck}%`;
        if (modifiersText.length > 0) {
            message += `\nModificadores: ${modifiersText.join(", ")}`;
        }
        
        showNotification(message, finalLuck > 50 ? "success" : "warning");
        saveToStorage();
    }

    function rollCustomDice() {
        const qty = systemData.diceSystem.quantity || 1;
        const maxDice = systemData.diceSystem.type;
        
        let baseRollTotal = 0;
        let rollsValues = [];
        
        for(let i=0; i<qty; i++) {
            const roll = Math.floor(Math.random() * maxDice) + 1;
            rollsValues.push(roll);
            baseRollTotal += roll;
        }
        
        let totalVal = baseRollTotal;
        let detailsHtml = `
            <div class="flex justify-between items-center bg-black/30 p-2 rounded border border-blue-900/30">
                <span class="font-bold text-gray-300">🎲 Dados Rolados (${qty}D${maxDice}):</span>
                <span class="font-mono text-blue-300 tracking-wider">[ ${rollsValues.join(' | ')} ] = <b class="text-white">${baseRollTotal}</b></span>
            </div>
        `;
        
        // 1. Modificadores de Status
        if (systemData.diceSystem.useStatus) {
            const activeAttrs = systemData.attributes.filter(a => a.active);
            if(activeAttrs.length > 0) {
                const somaAttrs = activeAttrs.reduce((sum, a) => sum + a.value, 0);
                const mediaStatus = Math.floor(somaAttrs / activeAttrs.length);
                const mod = Math.floor(mediaStatus / 10); 
                if (mod > 0) {
                    totalVal += mod;
                    detailsHtml += `
                        <div class="flex justify-between items-center bg-black/30 p-2 rounded border border-green-900/30 mt-1">
                            <span class="text-green-300 opacity-90"><i data-lucide="activity" class="inline w-3 h-3 mr-1"></i> Atributos Status (Média ${mediaStatus})</span>
                            <span class="font-bold text-green-400">+${mod}</span>
                        </div>
                    `;
                }
            }
        }
        
        // 2. Modificadores do Mascote
        if (systemData.diceSystem.useMascot) {
            try {
                const mascotDataJson = localStorage.getItem('grimorio_mascote_completo');
                if (mascotDataJson) {
                    const mascotData = JSON.parse(mascotDataJson);
                    const mascotLevel = mascotData.nivel || 1;
                    const mod = Math.floor(mascotLevel / 5) + 1; 
                    if (mod > 0) {
                        totalVal += mod;
                        detailsHtml += `
                            <div class="flex justify-between items-center bg-black/30 p-2 rounded border border-purple-900/30 mt-1">
                                <span class="text-purple-300 opacity-90"><i data-lucide="cat" class="inline w-3 h-3 mr-1"></i> Auxílio do Mascote (Nv ${mascotLevel})</span>
                                <span class="font-bold text-purple-400">+${mod}</span>
                            </div>
                        `;
                    }
                } else {
                    detailsHtml += `
                        <div class="flex justify-between items-center bg-red-900/20 p-2 rounded border border-red-900/30 mt-1">
                            <span class="text-red-400 opacity-90 text-xs text-center w-full">Nenhum Mascote Localizado no Cache</span>
                        </div>
                    `;
                }
            } catch(e) {}
        }
        
        // 3. Modificadores de Sorte e Humor
        if (systemData.diceSystem.useLuck) {
            const luckValue = systemData.luck.value; 
            let mod = 0;
            if(luckValue > 80) mod = Math.floor(maxDice * qty * 0.1) || 1; 
            else if(luckValue < 20) mod = -(Math.floor(maxDice * qty * 0.1) || 1); 
            
            if(mod !== 0) {
                totalVal += mod;
                const luckColor = mod > 0 ? "yellow" : "red";
                detailsHtml += `
                    <div class="flex justify-between items-center bg-black/30 p-2 rounded border border-${luckColor}-900/30 mt-1">
                        <span class="text-${luckColor}-300 opacity-90"><i data-lucide="clover" class="inline w-3 h-3 mr-1"></i> Sorte/Sentimento (${luckValue}%)</span>
                        <span class="font-bold text-${luckColor}-400">${mod > 0 ? '+'+mod : mod}</span>
                    </div>
                `;
            }
        }
        
        // Update DOM
        document.getElementById("dice-result-value").textContent = totalVal;
        document.getElementById("dice-result-details").innerHTML = detailsHtml;
        lucide.createIcons();
        
        systemData.diceSystem.lastResult = totalVal;
        systemData.diceSystem.lastString = detailsHtml;
        saveToStorage();
    }

    // =========== SISTEMA DE IMPORTAR ===========
    function openImportModal() {
        openModal("modal-import");
    }
    
    function normalizeText(text) {
        return text.toLowerCase()
            .normalize("NFD")
            .replace(/[\u0300-\u036f]/g, "")
            .replace(/[^a-z0-9]/g, "");
    }
    
    function findBestMatch(value, items, getNameFn) {
        const normalizedValue = normalizeText(value);
        let bestMatch = null;
        let bestScore = 0;
        
        items.forEach(item => {
            const itemName = getNameFn(item);
            const normalizedItemName = normalizeText(itemName);
            
            // Verificar correspondência exata
            if (normalizedItemName === normalizedValue) {
                bestMatch = item;
                bestScore = 100;
                return;
            }
            
            // Verificar se contém
            if (normalizedValue.includes(normalizedItemName) || normalizedItemName.includes(normalizedValue)) {
                const score = Math.min(normalizedValue.length, normalizedItemName.length) / 
                             Math.max(normalizedValue.length, normalizedItemName.length) * 100;
                if (score > bestScore) {
                    bestScore = score;
                    bestMatch = item;
                }
            }
        });
        
        // Aceitar se score for maior que 60%
        return bestScore > 60 ? bestMatch : null;
    }
    
    function processImport() {
        const importText = document.getElementById("import-data").value;
        if (!importText.trim()) {
            showNotification("Digite os dados para importar!", "error");
            return;
        }
        
        const lines = importText.split('\n');
        let importedCount = 0;
        let notFoundItems = [];
        
        lines.forEach(line => {
            const trimmedLine = line.trim();
            if (!trimmedLine) return;
            
            // Procurar padrões como "Nome: Valor" ou "Nome: Valor/Max"
            const match = trimmedLine.match(/^([^:]+):\s*(.+)$/);
            if (!match) return;
            
            const name = match[1].trim();
            const valuePart = match[2].trim();
            
            // Tentar extrair valor (e possível máximo)
            let value = 0;
            let max = null;
            
            // Padrão: "85/100"
            const valueMaxMatch = valuePart.match(/^(\d+)\s*\/\s*(\d+)$/);
            if (valueMaxMatch) {
                value = parseInt(valueMaxMatch[1]);
                max = parseInt(valueMaxMatch[2]);
            } else {
                // Apenas valor
                const numMatch = valuePart.match(/^(\d+)$/);
                if (numMatch) {
                    value = parseInt(numMatch[1]);
                }
            }
            
            if (isNaN(value)) return;
            
            // Primeiro, tentar encontrar em categorias
            let matchedItem = findBestMatch(name, systemData.categories, item => item.name);
            
            if (matchedItem) {
                // Atualizar categoria
                matchedItem.value = Math.min(value, matchedItem.max);
                if (max !== null && max > 0) {
                    matchedItem.max = max;
                }
                importedCount++;
                return;
            }
            
            // Tentar em atributos
            matchedItem = findBestMatch(name, systemData.attributes, item => item.name);
            
            if (matchedItem) {
                // Atualizar atributo
                matchedItem.value = Math.min(value, matchedItem.max);
                if (max !== null && max > 0) {
                    matchedItem.max = max;
                }
                importedCount++;
                return;
            }
            
            // Se não encontrou, adicionar à lista de não encontrados
            notFoundItems.push(name);
        });
        
        // Atualizar visualizações
        renderCategories();
        renderAttributes();
        updateDerivedAttributes();
        renderDerived();
        saveToStorage();
        
        // Fechar modal
        closeModal("modal-import");
        
        // Mostrar resultado
        let message = `${importedCount} valores importados com sucesso!`;
        if (notFoundItems.length > 0) {
            message += `\nNão encontrados: ${notFoundItems.join(", ")}`;
        }
        
        showNotification(message, importedCount > 0 ? "success" : "warning");
    }

    function saveAll() {

    function exportToTXT() {
        let txtContent = "=== FICHA DO PERSONAGEM ===\n";
        txtContent += `Gerado em: ${new Date().toLocaleString()}\n\n`;
        
        // Categorias
        txtContent += "--- CATEGORIAS ---\n";
        systemData.categories.forEach(cat => {
            if (cat.active) {
                txtContent += `${cat.name}: ${cat.value}/${cat.max} ${cat.locked ? "(Trancado)" : ""}\n`;
            }
        });
        
        // Atributos
        txtContent += "\n--- ATRIBUTOS ---\n";
        systemData.attributes.forEach(attr => {
            if (attr.active) {
                txtContent += `${attr.name}: ${attr.value}/${attr.max} ${attr.locked ? "(Trancado)" : ""}\n`;
            }
        });
        
        // Derivados
        txtContent += "\n--- ATRIBUTOS DERIVADOS ---\n";
        systemData.derived.forEach(derived => {
            if (derived.active) {
                txtContent += `${derived.name}: ${derived.value}\n`;
                txtContent += `  Fórmula: ${derived.formula}\n`;
            }
        });
        
        // Sorte
        txtContent += "\n--- SISTEMA DE SORTE ---\n";
        txtContent += `Sorte Atual: ${systemData.luck.value}%\n`;
        txtContent += "Modificadores Ativos:\n";
        systemData.luck.sentiments.forEach(sent => {
            if (sent.active) {
                txtContent += `  ${sent.type}: ${sent.effect} (${sent.intensity.toFixed(1)})\n`;
            }
        });
        
        // Histórico
        if (systemData.luck.rollHistory.length > 0) {
            txtContent += "\nÚltimas Rolagens de Sorte:\n";
            const lastRolls = systemData.luck.rollHistory.slice(-3);
            lastRolls.forEach(roll => {
                txtContent += `  ${roll.timestamp}: ${roll.final}% (Base: ${roll.base}%)\n`;
            });
        }
        
        // Configurações do Dado
        if (systemData.diceSystem) {
            txtContent += `\n--- SISTEMA DE ROLAGEM ---\n`;
            txtContent += `Tipo de Dado: ${systemData.diceSystem.quantity}D${systemData.diceSystem.type}\n`;
            txtContent += `Usa Status: ${systemData.diceSystem.useStatus ? "Sim" : "Não"}\n`;
            txtContent += `Usa Mascote: ${systemData.diceSystem.useMascot ? "Sim" : "Não"}\n`;
            txtContent += `Usa Condições/Sorte: ${systemData.diceSystem.useLuck ? "Sim" : "Não"}\n`;
            txtContent += `Último Resultado Exato (Total): ${systemData.diceSystem.lastResult}\n`;
        }
        
        // Criar e baixar arquivo
        const blob = new Blob([txtContent], { type: "text/plain" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "ficha_personagem.txt";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        
        showNotification("Ficha exportada como TXT!", "success");
    }
