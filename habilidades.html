<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Habilidades</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <!-- SEU SISTEMA DE ARMAZENAMENTO -->
    <script src="js/grimorio-core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

    <script>
        const q = s => document.querySelector(s);
        const qa = s => document.querySelectorAll(s);

        const typesConfig = {
            'dano': { label: "Dano", icon: "sword", color: "#dc2626" },
            'cura': { label: "Cura", icon: "heart", color: "#22c55e" },
            'buff': { label: "Buff", icon: "zap", color: "#f59e0b" },
            'debuff': { label: "Debuff", icon: "shield", color: "#8b5cf6" },
            'utilidade': { label: "Utilidade", icon: "wind", color: "#3b82f6" }
        };

        let skills = [];
        let filter = 'todos';

        function init() {
            Core.init();
            skills = Core.player.skills || [];
            if (!skills.length) {
                skills = [
                    { id: 1, nome: "Golpe Devastador", tipo: "dano", custoMana: 20, cooldown: 2, descricao: "Um golpe poderoso que causa 150% do dano base.", nivel: 3 },
                    { id: 2, nome: "Cura Menor", tipo: "cura", custoMana: 15, cooldown: 1, descricao: "Restaura 30 HP do alvo.", nivel: 2 }
                ];
            }
            render();
        }

        function save() {
            Core.player.skills = skills;
            Core.save();
        }

        function render() {
            renderFilters();
            renderGrid();
            lucide.createIcons();
        }

        function renderFilters() {
            const container = q('#filter-container');
            if (!container) return;
            let html = `<button onclick="setFilter('todos')" class="px-4 py-2 text-sm font-cinzel transition-all border rounded border-theme-border ${filter === 'todos' ? 'bg-red-600 text-[#0a0a0c] border-red-600' : 'bg-[#0f0f12] text-[#606060] hover:text-white'}">Todas</button>`;
            for (const [key, config] of Object.entries(typesConfig)) {
                const active = filter === key;
                html += `<button onclick="setFilter('${key}')" class="px-4 py-2 text-sm font-cinzel flex items-center gap-2 transition-all border border-theme-border rounded ${active ? '' : 'bg-[#0f0f12] text-[#606060] hover:text-white'}" style="${active ? `background: ${config.color}; color: #0a0a0c; border-color: ${config.color}` : ''}"><i data-lucide="${config.icon}" class="w-4 h-4"></i>${config.label}</button>`;
            }
            container.innerHTML = html;
        }

        function renderGrid() {
            const grid = q('#skills-grid');
            if (!grid) return;
            const items = filter === 'todos' ? skills : skills.filter(s => s.tipo === filter);
            grid.innerHTML = items.map(s => {
                const config = typesConfig[s.tipo] || typesConfig['dano'];
                return `
                <div class="skill-card bg-theme-panel border border-theme-border p-4 group hover:border-opacity-50 transition-all rounded relative anim-entry" style="border-left: 3px solid ${config.color}">
                    <div class="flex items-start justify-between mb-3">
                        <div class="flex items-center gap-3">
                            <div class="p-2 rounded" style="background: ${config.color}20"><i data-lucide="${config.icon}" class="w-5 h-5" style="color: ${config.color}"></i></div>
                            <div><h4 class="text-white font-medium">${s.nome}</h4><p class="text-xs text-[#606060]">Nível ${s.nivel}</p></div>
                        </div>
                        <div class="flex gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openModal(${s.id})" class="p-1.5 hover:bg-theme-blue/20 rounded"><i data-lucide="edit-2" class="w-3 h-3 text-theme-blue"></i></button>
                            <button onclick="deleteSkill(${s.id})" class="p-1.5 hover:bg-red-600/20 rounded"><i data-lucide="trash-2" class="w-3 h-3 text-red-600"></i></button>
                        </div>
                    </div>
                    <p class="text-[#808080] text-sm mb-4 min-h-[40px]">${s.descricao}</p>
                    <div class="flex gap-4 text-xs">
                        <div class="flex items-center gap-1"><i data-lucide="flame" class="w-3 h-3 text-blue-500"></i><span class="text-[#606060]">${s.custoMana} Mana</span></div>
                        <div class="flex items-center gap-1"><i data-lucide="zap" class="w-3 h-3 text-yellow-500"></i><span class="text-[#606060]">${s.cooldown} turnos</span></div>
                    </div>
                </div>`;
            }).join("") + `<button onclick="openModal()" class="bg-[#0f0f12] border-2 border-dashed border-theme-border p-8 flex flex-col items-center justify-center gap-3 hover:border-red-600 transition-colors group min-h-[200px] rounded anim-entry"><i data-lucide="plus" class="w-8 h-8 text-[#606060] group-hover:text-red-600"></i><span class="text-[#606060] group-hover:text-red-600 font-cinzel">Nova Habilidade</span></button>`;
        }

        function setFilter(f) { filter = f; render(); }

        function openModal(id = null) {
            const modal = q('#modal-overlay');
            const title = q('#modal-title');
            if (id) {
                const s = skills.find(sk => sk.id === id);
                title.innerText = "Editar Habilidade";
                q('#skill-id').value = s.id;
                q('#skill-nome').value = s.nome;
                q('#skill-tipo').value = s.tipo;
                q('#skill-nivel').value = s.nivel;
                q('#skill-mana').value = s.custoMana;
                q('#skill-cd').value = s.cooldown;
                q('#skill-desc').value = s.descricao;
            } else {
                title.innerText = "Nova Habilidade";
                q('#form-skill').reset();
                q('#skill-id').value = "";
            }
            modal.classList.remove('hidden');
        }

        function closeModal() { q('#modal-overlay').classList.add('hidden'); }

        function saveSkill(e) {
            e.preventDefault();
            const id = q('#skill-id').value;
            const item = {
                id: id ? parseInt(id) : Date.now(),
                nome: q('#skill-nome').value,
                tipo: q('#skill-tipo').value,
                nivel: parseInt(q('#skill-nivel').value),
                custoMana: parseInt(q('#skill-mana').value),
                cooldown: parseInt(q('#skill-cd').value),
                descricao: q('#skill-desc').value
            };
            if (id) {
                const idx = skills.findIndex(s => s.id == id);
                if (idx !== -1) skills[idx] = item;
            } else { skills.push(item); }
            save();
            closeModal();
            render();
        }

        function deleteSkill(id) {
            if (confirm("Excluir esta habilidade?")) {
                skills = skills.filter(s => s.id !== id);
                save();
                render();
            }
        }

        function exportTXT() {
            let txt = "=== HABILIDADES ===\n\n";
            skills.forEach(s => {
                txt += `[${s.tipo.toUpperCase()}] ${s.nome} (Nv.${s.nivel})\nCusto: ${s.custoMana}MP | CD: ${s.cooldown}T\nDesc: ${s.descricao}\n---\n`;
            });
            const blob = new Blob([txt], { type: "text/plain" });
            const url = URL.createObjectURL(blob);
            const a = document.createElement("a");
            a.href = url;
            a.download = "habilidades.txt";
            a.click();
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
