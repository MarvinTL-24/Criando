<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Ordem Paranormal</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="js/grimorio-core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { theme: { bg: '#0a0a0c', panel: '#0f0f12', border: '#2a2a2e', text: '#e8e4dc', pink: '#ec4899', red: '#dc2626', purple: '#8b5cf6', yellow: '#f59e0b', blue: '#4a9eff', green: '#22c55e', muted: '#606060' } } } }
        }
    </script>
    <style>
        body { background: #0a0a0c; color: #e8e4dc; font-family: 'Inter', sans-serif; }
        .section-panel { background: #0f0f12; border: 1px solid #2a2a2e; border-radius: 12px; padding: 1.5rem; }
        .stat-bar { height: 6px; background: #1a1a1a; border-radius: 3px; overflow: hidden; }
        .stat-bar-fill { height: 100%; transition: width 0.3s; }
        .tab-btn.active { color: #4a9eff; border-bottom: 2px solid #4a9eff; }
        .hidden { display: none; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <nav class="sticky top-0 bg-[#0f0f12]/95 backdrop-blur-md border-b border-theme-border z-50 mb-8 py-4">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-theme-blue font-medium"><i data-lucide="arrow-left" class="w-5 h-5"></i> <span class="font-cinzel">Voltar</span></a>
            <h1 class="font-cinzel text-xl font-bold text-theme-blue uppercase">Ordem Paranormal</h1>
            <div class="flex gap-2">
                <button onclick="save()" class="p-2 px-4 bg-theme-green/20 text-theme-green border border-theme-green/30 rounded text-sm font-bold">SALVAR</button>
            </div>
        </div>
    </nav>

    <div class="max-w-6xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <!-- Coluna 1: Info e Status -->
        <div class="space-y-6">
            <section class="section-panel border-l-4 border-l-theme-blue">
                <h3 class="font-cinzel text-theme-blue mb-4">Informações</h3>
                <div class="space-y-3">
                    <input type="text" id="char-name" placeholder="Personagem" class="w-full bg-theme-bg border border-theme-border rounded p-2 text-white">
                    <select id="char-class" class="w-full bg-theme-bg border border-theme-border rounded p-2 text-white outline-none">
                        <option value="combatente">Combatente</option><option value="especialista">Especialista</option><option value="ocultista">Ocultista</option>
                    </select>
                    <div class="flex gap-2">
                        <input type="number" id="char-nex" placeholder="NEX" class="w-1/2 bg-theme-bg border border-theme-border rounded p-2 text-white">
                        <input type="text" id="char-rank" placeholder="Patente" class="w-1/2 bg-theme-bg border border-theme-border rounded p-2 text-white">
                    </div>
                </div>
            </section>

            <section class="section-panel space-y-4">
                <div>
                    <div class="flex justify-between text-xs mb-1"><span>Vida</span> <span id="vida-display">20/20</span></div>
                    <div class="stat-bar"><div id="vida-bar" class="stat-bar-fill bg-theme-red"></div></div>
                    <input type="number" id="vida-input" class="w-full mt-2 bg-theme-bg border border-theme-border rounded p-1 text-center text-xs text-white">
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1"><span>Sanidade</span> <span id="sanidade-display">16/16</span></div>
                    <div class="stat-bar"><div id="sanidade-bar" class="stat-bar-fill bg-theme-blue"></div></div>
                    <input type="number" id="sanidade-input" class="w-full mt-2 bg-theme-bg border border-theme-border rounded p-1 text-center text-xs text-white">
                </div>
                <div>
                    <div class="flex justify-between text-xs mb-1"><span>Esforço</span> <span id="esforco-display">4/4</span></div>
                    <div class="stat-bar"><div id="esforco-bar" class="stat-bar-fill bg-theme-yellow"></div></div>
                    <input type="number" id="esforco-input" class="w-full mt-2 bg-theme-bg border border-theme-border rounded p-1 text-center text-xs text-white">
                </div>
            </section>
        </div>

        <!-- Coluna 2: Atributos e Perícias -->
        <div class="md:col-span-2 space-y-6">
            <section class="section-panel">
                <div class="flex border-b border-theme-border mb-4">
                    <button class="tab-btn active px-4 py-2 font-cinzel text-sm" onclick="tab('attrs')">Atributos</button>
                    <button class="tab-btn px-4 py-2 font-cinzel text-sm" onclick="tab('skills')">Perícias</button>
                </div>
                
                <div id="tab-attrs" class="grid grid-cols-5 gap-2">
                    <div v-for="a in ['agi','str','int','vig','pre']" class="text-center bg-white/5 p-3 rounded border border-theme-border">
                        <div class="text-[10px] uppercase text-theme-muted mb-1" id="lbl-agi">Agi</div>
                        <input type="number" id="input-agi" value="1" class="w-full bg-transparent text-center text-xl font-bold text-white outline-none">
                    </div>
                    <div class="text-center bg-white/5 p-3 rounded border border-theme-border">
                        <div class="text-[10px] uppercase text-theme-muted mb-1">For</div>
                        <input type="number" id="input-str" value="1" class="w-full bg-transparent text-center text-xl font-bold text-white outline-none">
                    </div>
                    <div class="text-center bg-white/5 p-3 rounded border border-theme-border">
                        <div class="text-[10px] uppercase text-theme-muted mb-1">Int</div>
                        <input type="number" id="input-int" value="1" class="w-full bg-transparent text-center text-xl font-bold text-white outline-none">
                    </div>
                    <div class="text-center bg-white/5 p-3 rounded border border-theme-border">
                        <div class="text-[10px] uppercase text-theme-muted mb-1">Vig</div>
                        <input type="number" id="input-vig" value="1" class="w-full bg-transparent text-center text-xl font-bold text-white outline-none">
                    </div>
                    <div class="text-center bg-white/5 p-3 rounded border border-theme-border">
                        <div class="text-[10px] uppercase text-theme-muted mb-1">Pre</div>
                        <input type="number" id="input-pre" value="1" class="w-full bg-transparent text-center text-xl font-bold text-white outline-none">
                    </div>
                </div>

                <div id="tab-skills" class="hidden grid grid-cols-2 sm:grid-cols-3 gap-2">
                    <!-- Gerado -->
                </div>
            </section>

            <section class="section-panel">
                <h3 class="font-cinzel text-theme-blue mb-4">Combate</h3>
                <div class="grid grid-cols-3 gap-4">
                    <div class="text-center bg-theme-bg border border-theme-border p-3 rounded">
                        <div class="text-[10px] uppercase text-theme-muted">Defesa</div>
                        <input type="number" id="defense" class="w-full bg-transparent text-center font-bold text-lg">
                    </div>
                    <div class="text-center bg-theme-bg border border-theme-border p-3 rounded">
                        <div class="text-[10px] uppercase text-theme-muted">Esquiva</div>
                        <input type="number" id="dodge" class="w-full bg-transparent text-center font-bold text-lg">
                    </div>
                    <div class="text-center bg-theme-bg border border-theme-border p-3 rounded">
                        <div class="text-[10px] uppercase text-theme-muted">Bloqueio</div>
                        <input type="number" id="block" class="w-full bg-transparent text-center font-bold text-lg">
                    </div>
                </div>
            </section>
        </div>
    </div>

    <script>
        const q = s => document.querySelector(s);
        const qa = s => document.querySelectorAll(s);

        function init() {
            Core.init();
            render();
            setup();
        }

        function setup() {
            qa('input, select, textarea').forEach(el => {
                el.addEventListener('change', () => save());
            });
        }

        function tab(id) {
            qa('.tab-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase().includes(id)));
            q('#tab-attrs').classList.toggle('hidden', id !== 'attrs');
            q('#tab-skills').classList.toggle('hidden', id !== 'skills');
        }

        function save() {
            const user = Core.load();
            const p = user.paranormal;
            user.name = q('#char-name').value;
            user.class = q('#char-class').value;
            p.rank = q('#char-rank').value;
            p.nex = parseInt(q('#char-nex').value) || 5;
            user.res.hp = parseInt(q('#vida-input').value) || 0;
            p.sanity = parseInt(q('#sanidade-input').value) || 0;
            p.effort = parseInt(q('#esforco-input').value) || 0;
            ['agi','str','int','vig','pre'].forEach(a => p.attributes[a] = parseInt(q(`#input-${a}`).value) || 0);
            p.defenses.defense = parseInt(q('#defense').value) || 10;
            p.defenses.dodge = parseInt(q('#dodge').value) || 0;
            p.defenses.block = parseInt(q('#block').value) || 0;
            Core.save(user);
            render();
        }

        function render() {
            const user = Core.load();
            const p = user.paranormal;
            q('#char-name').value = user.name;
            q('#char-class').value = user.class;
            q('#char-rank').value = p.rank;
            q('#char-nex').value = p.nex;
            q('#vida-input').value = user.res.hp;
            q('#vida-display').innerText = `${user.res.hp}/${user.res.hpMax}`;
            q('#vida-bar').style.width = `${(user.res.hp / user.res.hpMax) * 100}%`;
            q('#sanidade-input').value = p.sanity;
            q('#sanidade-display').innerText = `${p.sanity}/${p.sanityMax}`;
            q('#sanidade-bar').style.width = `${(p.sanity / p.sanityMax) * 100}%`;
            q('#esforco-input').value = p.effort;
            q('#esforco-display').innerText = `${p.effort}/${p.effortMax}`;
            q('#esforco-bar').style.width = `${(p.effort / p.effortMax) * 100}%`;
            ['agi','str','int','vig','pre'].forEach(a => q(`#input-${a}`).value = p.attributes[a]);
            q('#defense').value = p.defenses.defense;
            q('#dodge').value = p.defenses.dodge;
            q('#block').value = p.defenses.block;
            renderSkills();
            lucide.createIcons();
        }

        function renderSkills() {
            const list = q('#tab-skills');
            const skills = ["Acrobacia", "Atletismo", "Crime", "Diplomacia", "Enganação", "Fortitude", "Furtividade", "Iniciativa", "Intimidação", "Investigação", "Luta", "Ocultismo", "Percepção", "Pontaria", "Reflexos", "Tática", "Vontade"];
            const user = Core.load();
            list.innerHTML = skills.map(s => `
                <div class="p-2 bg-white/5 border border-theme-border rounded text-[10px] uppercase">
                    <span class="block text-theme-muted mb-1">${s}</span>
                    <input type="number" value="${user.paranormal.skills[s] || 0}" onchange="updateSkill('${s}', this.value)" class="w-full bg-transparent text-white font-bold outline-none">
                </div>
            `).join('');
        }

        function updateSkill(s, v) {
            const user = Core.load();
            user.paranormal.skills[s] = parseInt(v) || 0;
            Core.save(user);
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
