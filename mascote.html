<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Mascote</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <script src="js/grimorio-core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = { theme: { extend: { colors: { theme: { bg: '#0a0a0c', panel: '#0f0f12', border: '#2a2a2e', text: '#e8e4dc', pink: '#ec4899', red: '#dc2626', blue: '#4a9eff' } } } } }
    </script>
    <style>
        body { background: #0a0a0c; color: #e8e4dc; font-family: 'Inter', sans-serif; }
        .section { background: #0f0f12; border: 1px solid #2a2a2e; border-radius: 12px; padding: 1.5rem; }
    </style>
</head>
<body class="min-h-screen pb-12">
    <nav class="sticky top-0 bg-[#0f0f12]/95 border-b border-theme-border z-50 mb-8 py-4">
        <div class="max-w-6xl mx-auto px-6 flex justify-between items-center">
            <a href="index.html" class="flex items-center gap-2 text-theme-pink"><i data-lucide="arrow-left" class="w-5 h-5"></i> <span class="font-cinzel">Hub</span></a>
            <h1 class="font-cinzel text-xl font-bold text-theme-pink uppercase">Mascote</h1>
            <button onclick="save()" class="px-4 py-1 bg-theme-pink/20 text-theme-pink border border-theme-pink/30 rounded text-xs font-bold">SALVAR</button>
        </div>
    </nav>

    <div class="max-w-4xl mx-auto px-4 grid grid-cols-1 md:grid-cols-3 gap-6">
        <div class="md:col-span-1 space-y-6">
            <div class="section flex flex-col items-center">
                <div id="img-container" class="w-32 h-32 bg-black border-2 border-theme-pink rounded-lg overflow-hidden mb-4 cursor-pointer relative group" onclick="q('#file-input').click()">
                    <img id="mascot-img" class="w-full h-full object-cover">
                    <div class="absolute inset-0 bg-black/50 opacity-0 group-hover:opacity-100 flex items-center justify-center text-[10px]">ALTERAR</div>
                </div>
                <input type="file" id="file-input" class="hidden" onchange="upload(event)">
                <input type="text" id="m-name" class="w-full bg-black border border-theme-border rounded p-2 text-white text-center font-bold" placeholder="Nome">
                <input type="number" id="m-lv" class="w-full mt-2 bg-black border border-theme-border rounded p-1 text-center text-xs" placeholder="Nível">
            </div>
            <div class="section">
                <h3 class="font-cinzel text-theme-red text-xs mb-4">Atributos</h3>
                <div class="space-y-2">
                    <div v-for="s in ['AGI','STR','PER','DEF','STA']" class="flex items-center justify-between">
                        <span class="text-xs text-gray-500">AGI</span>
                        <input type="number" id="s-agi" class="w-12 bg-black border border-theme-border rounded p-1 text-center text-xs">
                    </div>
                    <div class="flex items-center justify-between"><span class="text-xs text-gray-500">STR</span><input type="number" id="s-str" class="w-12 bg-black border border-theme-border rounded p-1 text-center text-xs"></div>
                    <div class="flex items-center justify-between"><span class="text-xs text-gray-500">PER</span><input type="number" id="s-per" class="w-12 bg-black border border-theme-border rounded p-1 text-center text-xs"></div>
                    <div class="flex items-center justify-between"><span class="text-xs text-gray-500">DEF</span><input type="number" id="s-def" class="w-12 bg-black border border-theme-border rounded p-1 text-center text-xs"></div>
                    <div class="flex items-center justify-between"><span class="text-xs text-gray-500">STA</span><input type="number" id="s-sta" class="w-12 bg-black border border-theme-border rounded p-1 text-center text-xs"></div>
                </div>
            </div>
        </div>

        <div class="md:col-span-2 space-y-6">
            <div class="section">
                <h3 class="font-cinzel text-theme-blue text-xs mb-4">Status & Info</h3>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="text-[10px] uppercase text-gray-500">Vida</label>
                        <div class="flex gap-2"><input type="number" id="m-hp" class="w-1/2 bg-black border border-theme-border rounded p-1 text-center"><input type="number" id="m-hpmax" class="w-1/2 bg-black border border-theme-border rounded p-1 text-center"></div>
                    </div>
                    <div>
                        <label class="text-[10px] uppercase text-gray-500">Lealdade %</label>
                        <input type="number" id="m-loyalty" class="w-full bg-black border border-theme-border rounded p-1 text-center">
                    </div>
                </div>
                <textarea id="m-desc" placeholder="História / Personalidade" class="w-full mt-4 bg-black border border-theme-border rounded p-2 text-xs h-24 outline-none"></textarea>
            </div>
            <div class="section">
                <div class="flex justify-between items-center mb-4"><h3 class="font-cinzel text-theme-pink text-xs">Habilidades</h3><button onclick="addSkill()" class="p-1 hover:text-theme-pink"><i data-lucide="plus" class="w-4 h-4"></i></button></div>
                <div id="skills-list" class="space-y-2"></div>
            </div>
        </div>
    </div>

    <script>
        const q = s => document.querySelector(s);
        let user = Core.load();

        function render() {
            const m = user.mascot;
            q('#m-name').value = m.name;
            q('#m-lv').value = m.level;
            q('#m-hp').value = m.hp;
            q('#m-hpmax').value = m.hpMax;
            q('#m-loyalty').value = m.loyalty;
            q('#m-desc').value = m.desc.history;
            q('#s-agi').value = m.stats.agi;
            q('#s-str').value = m.stats.str;
            q('#s-per').value = m.stats.per;
            q('#s-def').value = m.stats.def;
            q('#s-sta').value = m.stats.sta;
            q('#mascot-img').src = m.icon || '';
            renderSkills();
            lucide.createIcons();
        }

        function renderSkills() {
            q('#skills-list').innerHTML = user.mascot.skills.map((s, i) => `
                <div class="p-2 bg-black/40 border border-theme-border rounded flex justify-between items-center">
                    <input type="text" value="${s.nome}" onchange="editSkill(${i}, this.value)" class="bg-transparent text-xs w-full outline-none">
                    <button onclick="delSkill(${i})" class="text-red-500 ml-2"><i data-lucide="trash" class="w-3 h-3"></i></button>
                </div>
            `).join('');
        }

        function save() {
            const m = user.mascot;
            m.name = q('#m-name').value;
            m.level = parseInt(q('#m-lv').value);
            m.hp = parseInt(q('#m-hp').value);
            m.hpMax = parseInt(q('#m-hpmax').value);
            m.loyalty = parseInt(q('#m-loyalty').value);
            m.desc.history = q('#m-desc').value;
            m.stats = {
                agi: parseInt(q('#s-agi').value), str: parseInt(q('#s-str').value),
                per: parseInt(q('#s-per').value), def: parseInt(q('#s-def').value), sta: parseInt(q('#s-sta').value)
            };
            Core.save(user);
            Core.notify('Mascote salvo!');
        }

        function addSkill() { user.mascot.skills.push({ nome: 'Nova Habilidade' }); renderSkills(); }
        function editSkill(i, v) { user.mascot.skills[i].nome = v; }
        function delSkill(i) { user.mascot.skills.splice(i, 1); renderSkills(); }
        function upload(e) {
            const f = e.target.files[0];
            if (f) {
                const r = new FileReader();
                r.onload = ev => { user.mascot.icon = ev.target.result; q('#mascot-img').src = ev.target.result; };
                r.readAsDataURL(f);
            }
        }
        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
