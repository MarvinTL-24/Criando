<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Mascote</title>
    <script src="js/grimorio-core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cinzel: ['Cinzel', 'serif'], sans: ['Inter', 'sans-serif'] },
                    colors: { theme: { bg: '#0a0a0c', panel: '#0f0f12', border: '#2a2a2e', blue: '#4a9eff', pink: '#ec4899' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: #e8e4dc; }
        .glass { background: rgba(15, 15, 18, 0.6); backdrop-blur: 10px; border: 1px solid #2a2a2e; }
        .stat-input { background: transparent; border-bottom: 1px solid #2a2a2e; width: 100%; text-align: center; color: #4a9eff; font-weight: bold; }
        .stat-input:focus { border-bottom-color: #4a9eff; outline: none; }
    </style>
</head>
<body class="min-h-screen pb-20">
    <nav class="w-full bg-[#0f0f12]/95 border-b border-theme-border sticky top-0 z-50 px-6 py-4 mb-8">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 text-theme-blue hover:brightness-110"><i data-lucide="arrow-left" class="w-5 h-5"></i> <span class="font-cinzel text-sm uppercase">Sair</span></a>
            <h1 class="font-cinzel text-xl font-bold tracking-widest text-white">MASCOTE</h1>
            <button onclick="save()" class="px-4 py-2 bg-theme-blue text-white rounded-lg text-sm font-bold uppercase tracking-widest">Salvar</button>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto px-6 grid grid-cols-1 md:grid-cols-12 gap-8">
        <div class="md:col-span-4 flex flex-col items-center">
            <div id="icon-container" class="w-48 h-48 bg-theme-panel border-4 border-dashed border-theme-border rounded-full flex flex-col items-center justify-center cursor-pointer overflow-hidden transition-all hover:border-theme-blue" onclick="document.getElementById('f-up').click()">
                <i data-lucide="camera" class="w-10 h-10 text-gray-700"></i>
                <span class="text-[10px] text-gray-600 uppercase mt-2">Adicionar Foto</span>
            </div>
            <input type="file" id="f-up" class="hidden" accept="image/*" onchange="preview(event)">
            
            <div class="w-full mt-8 glass rounded-2xl p-6">
                <h3 class="font-cinzel text-sm font-bold text-theme-blue mb-6 uppercase tracking-wider text-center">Atributos Primordiais</h3>
                <div class="grid grid-cols-2 gap-6">
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 uppercase mb-1">Força</p>
                        <input type="number" id="m-str" class="stat-input text-xl">
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 uppercase mb-1">Agilidade</p>
                        <input type="number" id="m-agi" class="stat-input text-xl">
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 uppercase mb-1">Percepção</p>
                        <input type="number" id="m-per" class="stat-input text-xl">
                    </div>
                    <div class="text-center">
                        <p class="text-[9px] text-gray-500 uppercase mb-1">Defesa</p>
                        <input type="number" id="m-def" class="stat-input text-xl">
                    </div>
                </div>
            </div>
        </div>

        <div class="md:col-span-8 space-y-6">
            <section class="glass rounded-2xl p-6">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[10px] text-gray-500 uppercase">Nome do Mascote</label><input type="text" id="m-name" class="w-full bg-transparent border-b border-theme-border py-2 text-white outline-none focus:border-theme-blue"></div>
                    <div><label class="text-[10px] text-gray-500 uppercase">Espécie / Tipo</label><input type="text" id="m-type" class="w-full bg-transparent border-b border-theme-border py-2 text-white outline-none focus:border-theme-blue"></div>
                </div>
            </section>

            <section class="glass rounded-2xl p-6 h-64">
                <h3 class="font-cinzel text-theme-pink text-xs font-bold mb-4 uppercase tracking-widest">Personalidade & Comportamento</h3>
                <textarea id="m-perso" class="w-full h-40 bg-transparent border border-theme-border rounded-xl p-4 text-sm outline-none focus:border-theme-pink transition-all" placeholder="Como o mascote age com o dono e com estranhos?"></textarea>
            </section>
        </div>
    </main>

    <script>
        const q = s => document.querySelector(s);
        let user = Core.load();
        let m = user.mascot;

        function load() {
            q('#m-name').value = m.name || '';
            q('#m-type').value = m.type || '';
            q('#m-str').value = m.stats.str || 0;
            q('#m-agi').value = m.stats.agi || 0;
            q('#m-per').value = m.stats.per || 0;
            q('#m-def').value = m.stats.def || 0;
            q('#m-perso').value = m.desc.personality || '';
            if (m.icon) { q('#icon-container').style.backgroundImage = `url('${m.icon}')`; q('#icon-container').style.backgroundSize = 'cover'; q('#icon-container').innerHTML = ''; }
            lucide.createIcons();
        }

        function save() {
            m.name = q('#m-name').value;
            m.type = q('#m-type').value;
            m.stats.str = parseInt(q('#m-str').value);
            m.stats.agi = parseInt(q('#m-agi').value);
            m.stats.per = parseInt(q('#m-per').value);
            m.stats.def = parseInt(q('#m-def').value);
            m.desc.personality = q('#m-perso').value;
            Core.save(user); Core.notify('Dados do Mascote salvos!', 'success');
        }

        function preview(e) {
            const f = e.target.files[0]; if (!f) return;
            const r = new FileReader();
            r.onload = ev => { m.icon = ev.target.result; q('#icon-container').style.backgroundImage = `url('${ev.target.result}')`; q('#icon-container').style.backgroundSize = 'cover'; q('#icon-container').innerHTML = ''; };
            r.readAsDataURL(f);
        }

        document.addEventListener('DOMContentLoaded', load);
    </script>
</body>
</html>
