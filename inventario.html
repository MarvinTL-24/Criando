<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grimório Digital - Inventário</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Inter:wght@300;400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
    <script src="js/grimorio-core.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { cinzel: ['Cinzel', 'serif'], sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    colors: { theme: { bg: '#0a0a0c', panel: '#0f0f12', border: '#2a2a2e', text: '#e8e4dc', blue: '#4a9eff' } }
                }
            }
        }
    </script>
    <style>
        body { background-color: #0a0a0c; color: #e8e4dc; }
        .anim-entry { animation: fadeInUp 0.4s ease-out forwards; opacity: 0; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #modal-overlay { transition: opacity 0.3s ease; }
        #modal-overlay.hidden { pointer-events: none; opacity: 0; }
    </style>
</head>
<body class="min-h-screen font-sans pb-12">
    <nav class="w-full bg-[#0f0f12]/95 border-b border-theme-border sticky top-0 z-50 mb-8">
        <div class="max-w-screen-2xl mx-auto px-6 flex items-center justify-between py-4">
            <a href="index.html" class="flex items-center gap-2 px-3 py-2 bg-blue-600/10 border border-blue-600/30 rounded-lg text-theme-blue font-medium hover:bg-blue-600/20 transition-all">
                <i data-lucide="arrow-left" class="w-5 h-5"></i>
                <span class="font-cinzel text-sm">Hub</span>
            </a>
            <span class="font-cinzel text-xl font-bold text-theme-blue uppercase">Inventário</span>
            <div id="weight-display" class="text-xs font-mono text-gray-500">Peso: 0/50kg</div>
        </div>
        <div class="h-[1px] bg-gradient-to-r from-transparent via-theme-blue to-transparent"></div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 space-y-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <div class="bg-theme-panel border border-theme-border p-4 rounded-lg flex items-center gap-4">
                <div class="p-3 rounded bg-yellow-600/10 border border-yellow-600/20"><i data-lucide="coins" class="w-6 h-6 text-yellow-600"></i></div>
                <div><p class="text-xs text-gray-500 uppercase">Dinheiro</p><p id="money-display" class="font-mono text-white">0G 0S 100C</p></div>
            </div>
            <div class="bg-theme-panel border border-theme-border p-4 rounded-lg flex items-center gap-4 md:col-span-2">
                <div class="p-3 rounded bg-blue-600/10 border border-blue-600/20"><i data-lucide="package" class="w-6 h-6 text-theme-blue"></i></div>
                <div class="flex-grow">
                    <div class="flex justify-between text-xs mb-1"><span class="text-gray-500 uppercase">Carga</span><span id="weight-text" class="text-gray-400">0 / 50.0 kg</span></div>
                    <div class="w-full h-2 bg-black rounded-full overflow-hidden"><div id="weight-bar" class="h-full bg-theme-blue" style="width: 0%"></div></div>
                </div>
            </div>
        </div>

        <div id="items-grid" class="grid md:grid-cols-2 lg:grid-cols-3 gap-4 anim-entry"></div>
    </main>

    <div id="modal-overlay" class="fixed inset-0 z-[60] bg-black/80 backdrop-blur-sm flex items-center justify-center hidden p-4">
        <div class="bg-theme-panel border border-theme-border w-full max-w-md rounded-lg p-6">
            <h2 id="modal-title" class="font-cinzel text-xl text-white mb-6">Novo Item</h2>
            <form id="form-item" onsubmit="saveItem(event)" class="space-y-4">
                <input type="hidden" id="item-id">
                <div><label class="block text-xs uppercase text-gray-500 mb-2">Nome</label><input type="text" id="item-name" required class="w-full bg-black border border-theme-border rounded p-2 text-white outline-none"></div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs uppercase text-gray-500 mb-2">Tipo</label><select id="item-type" class="w-full bg-black border border-theme-border rounded p-2 text-white outline-none">
                        <option value="Arma">Arma</option><option value="Armadura">Armadura</option><option value="Consumível">Consumível</option><option value="Material">Material</option><option value="Outro">Outro</option>
                    </select></div>
                    <div><label class="block text-xs uppercase text-gray-500 mb-2">Raridade</label><select id="item-rarity" class="w-full bg-black border border-theme-border rounded p-2 text-white outline-none">
                        <option value="Comum">Comum</option><option value="Incomum">Incomum</option><option value="Raro">Raro</option><option value="Épico">Épico</option><option value="Lendário">Lendário</option>
                    </select></div>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="block text-xs uppercase text-gray-500 mb-2">Peso (kg)</label><input type="number" id="item-weight" step="0.1" value="1.0" class="w-full bg-black border border-theme-border rounded p-2 text-white outline-none"></div>
                    <div><label class="block text-xs uppercase text-gray-500 mb-2">Quantidade</label><input type="number" id="item-qty" value="1" class="w-full bg-black border border-theme-border rounded p-2 text-white outline-none"></div>
                </div>
                <div class="flex justify-end gap-3 pt-4 border-t border-theme-border"><button type="button" onclick="closeModal()" class="px-4 py-2 text-gray-400">Cancelar</button><button type="submit" class="bg-theme-blue text-white px-6 py-2 rounded font-medium">Salvar</button></div>
            </form>
        </div>
    </div>

    <script>
        const q = s => document.querySelector(s);
        let user = Core.load();

        const rarities = {
            'Comum': '#606060', 'Incomum': '#22c55e', 'Raro': '#4a9eff', 'Épico': '#8b5cf6', 'Lendário': '#f59e0b'
        };

        function render() {
            const grid = q('#items-grid');
            let weight = 0;
            grid.innerHTML = user.items.map(item => {
                weight += (item.weight || 0) * (item.qty || 1);
                const color = rarities[item.rarity] || '#606060';
                return `
                <div class="bg-theme-panel border border-theme-border p-4 group hover:border-blue-600/30 transition-all rounded" style="border-left: 3px solid ${color}">
                    <div class="flex justify-between items-start mb-2">
                        <div><h4 class="text-white font-medium">${item.name}</h4><span class="text-[10px] uppercase font-bold" style="color:${color}">${item.rarity}</span></div>
                        <div class="flex gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                            <button onclick="openModal('${item.id}')" class="p-1 hover:bg-blue-500/10 rounded"><i data-lucide="edit-2" class="w-4 h-4 text-theme-blue"></i></button>
                            <button onclick="del('${item.id}')" class="p-1 hover:bg-red-500/10 rounded"><i data-lucide="trash" class="w-4 h-4 text-red-500"></i></button>
                        </div>
                    </div>
                    <div class="flex justify-between text-xs text-gray-500 font-mono mt-4"><span>${item.qty}x</span><span>${item.weight} kg</span></div>
                </div>`;
            }).join("") + `<button onclick="openModal()" class="bg-black border-2 border-dashed border-theme-border p-8 flex flex-col items-center justify-center gap-2 hover:border-theme-blue transition-colors group rounded"><i data-lucide="plus" class="w-6 h-6 text-gray-600 group-hover:text-theme-blue"></i><span class="text-gray-600 group-hover:text-theme-blue font-cinzel text-xs">Adicionar</span></button>`;
            
            const maxW = user.limits.weight || 50;
            q('#weight-text').innerText = `${weight.toFixed(1)} / ${maxW} kg`;
            q('#weight-bar').style.width = `${Math.min(100, (weight / maxW) * 100)}%`;
            q('#weight-display').innerText = `Peso: ${weight.toFixed(1)}/${maxW}kg`;
            const m = user.money;
            q('#money-display').innerText = `${m.gold}G ${m.silver}S ${m.copper}C`;
            lucide.createIcons();
        }

        function openModal(id = null) {
            if (id) {
                const item = user.items.find(x => x.id == id);
                q('#item-id').value = item.id;
                q('#item-name').value = item.name;
                q('#item-type').value = item.type;
                q('#item-rarity').value = item.rarity;
                q('#item-weight').value = item.weight;
                q('#item-qty').value = item.qty;
            } else { q('#form-item').reset(); q('#item-id').value = ""; }
            q('#modal-overlay').classList.remove('hidden');
        }
        function closeModal() { q('#modal-overlay').classList.add('hidden'); }
        function saveItem(e) {
            e.preventDefault();
            const id = q('#item-id').value;
            const item = {
                id: id || Date.now(),
                name: q('#item-name').value,
                type: q('#item-type').value,
                rarity: q('#item-rarity').value,
                weight: parseFloat(q('#item-weight').value),
                qty: parseInt(q('#item-qty').value)
            };
            if (id) { const i = user.items.findIndex(x => x.id == id); user.items[i] = item; }
            else user.items.push(item);
            Core.save(user);
            closeModal();
            render();
        }
        function del(id) { if (confirm('Excluir?')) { user.items = user.items.filter(x => x.id != id); Core.save(user); render(); } }

        document.addEventListener('DOMContentLoaded', render);
    </script>
</body>
</html>
